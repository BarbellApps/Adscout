<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AdScout Capture</title>
    <style>
      body {
        width: 260px;
        font-family: system-ui, sans-serif;
        background: #0b0b12;
        color: #ededf5;
        padding: 12px;
      }
      h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 10px;
      }
      label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #75758a;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        background: #14141e;
        border: 1px solid #26263a;
        color: #ededf5;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        margin-bottom: 10px;
      }
      button {
        width: 100%;
        background: #8b5cf6;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 8px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
      }
      p {
        font-size: 11px;
        color: #75758a;
        margin-top: 10px;
      }
      #status {
        font-size: 11px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>AdScout Capture</h1>
    <label for="apiBaseUrl">App URL</label>
    <input id="apiBaseUrl" placeholder="https://yourapp.com" />
    <label for="apiKey">API key</label>
    <input id="apiKey" type="password" placeholder="adsk_..." />
    <button id="save">Save</button>
    <p id="status"></p>
    <p>Right-click any ad image on the web and choose "Save ad image to AdScout".</p>
    <script src="popup.js"></script>
  </body>
</html>
